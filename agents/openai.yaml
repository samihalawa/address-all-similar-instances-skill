interface:
  display_name: "Address Similar Instances"
  short_description: "Generalize one proven issue into its broader failure class and sweep the nearest related hierarchy"
  default_prompt: "Use $address-all-similar-instances-skill when the user is frustrated that only one example was fixed and they want the broader related class addressed. Start from the first proven issue, define the problem in general failure-class terms, map the nearest hierarchy around it (same file, component family, route family, workflow, client/server twin), search those adjacent surfaces with grep plus code and UI inspection, separate exact duplicates from same-class siblings and adjacent workflow issues, fix the full high-confidence cluster, verify the important surfaces, and do not stop while a credible related issue remains that would make the user say the sweep was incomplete."
