interface:
  display_name: "Address Similar Instances"
  short_description: "Generalize one proven issue into its broader failure class and sweep the nearest related hierarchy"
  default_prompt: "Use $address-all-similar-instances-skill when the user is frustrated that only one example was fixed and they want the broader related class addressed. If the thread is long, typo-heavy, correction-heavy, or off-track, first re-read prior user messages sequentially using the discipline from $conversation-analyzer: extract explicit request, implicit intent, frustration signals, constraints, examples, and trust user corrections over earlier assistant claims. Compress that into a short internal execution contract. Then start from the first proven issue, define the problem in general failure-class terms, and begin with a few smart first-pass programmatic discovery attempts across the real codebase: use rg on selectors/props/helpers/guards/copy fragments, use tree -I node_modules on the relevant source subtree, inspect imports/callers/callees, use mdfind when useful, and use semantic-search-style tools when available. Use this pass to surface likely related files quickly, but do not treat it as proof or as a stop condition. Then map the nearest hierarchy around the seed issue (same file, component family, route family, workflow, client/server twin) and inspect the adjacent surfaces. Do not anchor on exact selector matches; if the literal token search is sparse, broaden to semantic equivalents, sibling wrappers, nearby routes, and the same user-facing failure class. Do not over-trust grep hits either; manually verify whether returned files are truly the same class of issue. Separate exact duplicates from same-class siblings and adjacent workflow issues, fix the full high-confidence cluster, verify the important surfaces, and do not stop while a credible related issue remains that would make the user say the sweep was incomplete. If the first-pass discovery sweep finds nothing, continue manually instead of stopping. If the sweep is large, scale it with $parallel-task-spark or $super-swarm-spark by creating a short same-class execution plan and delegating the sibling instances in parallel."
