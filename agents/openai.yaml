interface:
  display_name: "Address Similar Instances"
  short_description: "Generalize one proven issue into its broader failure class and sweep the nearest related hierarchy"
  default_prompt: "Use $address-all-similar-instances-skill when the user is frustrated that only one example was fixed and they want the broader related class addressed. Start from the first proven issue, define the problem in general failure-class terms, map the nearest hierarchy around it (same file, component family, route family, workflow, client/server twin), and search those adjacent surfaces with grep plus code and UI inspection. Do not anchor on exact selector matches; if the literal token search is sparse, broaden to semantic equivalents, sibling wrappers, nearby routes, and the same user-facing failure class. Separate exact duplicates from same-class siblings and adjacent workflow issues, fix the full high-confidence cluster, verify the important surfaces, and do not stop while a credible related issue remains that would make the user say the sweep was incomplete. If the sweep is large, scale it with $parallel-task-spark or $super-swarm-spark by creating a short same-class execution plan and delegating the sibling instances in parallel."
